<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Click Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <style>
        /* Apply the same fix */
        .modal-backdrop {
            z-index: 1040 !important;
        }
        .modal {
            z-index: 1050 !important;
        }
        .modal-dialog {
            z-index: 1051 !important;
            position: relative;
        }
        .modal-content {
            z-index: 1052 !important;
            position: relative;
            pointer-events: auto !important;
        }
        .modal * {
            pointer-events: auto !important;
        }
        
        .test-result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .test-success {
            background: #d4edda;
            color: #155724;
        }
        .test-fail {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4>🧪 Modal Click Test - Debugging Tool</h4>
            </div>
            <div class="card-body">
                <h5>Step 1: Open Modal</h5>
                <button type="button" class="btn btn-primary" onclick="openTestModal()">
                    <i class="bi bi-plus-circle"></i> Open Test Modal
                </button>
                
                <hr class="my-4">
                
                <h5>Test Results:</h5>
                <div id="testResults"></div>
                
                <hr class="my-4">
                
                <h5>Z-Index Values:</h5>
                <div id="zIndexInfo" class="alert alert-info"></div>
            </div>
        </div>
    </div>

    <!-- Test Modal -->
    <div class="modal fade" id="testModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Test Modal - Try Clicking Here</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" onclick="logClick('Close button')"></button>
                </div>
                <div class="modal-body">
                    <div class="alert alert-success">
                        <strong>✅ If you can see this clearly, the modal is visible!</strong>
                    </div>
                    
                    <h6>Test 1: Text Input</h6>
                    <input type="text" class="form-control mb-3" placeholder="Try typing here..." 
                           onclick="logClick('Text input')" onfocus="logClick('Text input focused')">
                    
                    <h6>Test 2: Button Click</h6>
                    <button type="button" class="btn btn-success mb-3" onclick="logClick('Success button')">
                        <i class="bi bi-check"></i> Click Me
                    </button>
                    
                    <h6>Test 3: Dropdown</h6>
                    <select class="form-select mb-3" onclick="logClick('Dropdown')" onchange="logClick('Dropdown changed')">
                        <option>Select an option</option>
                        <option>Option 1</option>
                        <option>Option 2</option>
                    </select>
                    
                    <h6>Test 4: Textarea</h6>
                    <textarea class="form-control mb-3" placeholder="Try typing here..." 
                              onclick="logClick('Textarea')" onfocus="logClick('Textarea focused')"></textarea>
                    
                    <h6>Test 5: Checkbox</h6>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="testCheck" onclick="logClick('Checkbox')">
                        <label class="form-check-label" for="testCheck" onclick="logClick('Checkbox label')">
                            Try clicking this checkbox
                        </label>
                    </div>
                    
                    <div id="clickLog" class="alert alert-warning">
                        <strong>Click Log:</strong>
                        <div id="clickLogContent">No clicks yet...</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" onclick="logClick('Cancel button')">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="logClick('Save button')">
                        <i class="bi bi-save"></i> Save
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        let clickCount = 0;
        let clicks = [];
        
        function openTestModal() {
            console.log('Opening modal...');
            var myModal = new bootstrap.Modal(document.getElementById('testModal'));
            myModal.show();
            
            // Wait a bit then check z-index
            setTimeout(checkZIndex, 500);
        }
        
        function logClick(element) {
            clickCount++;
            clicks.push(element);
            console.log('Clicked:', element);
            
            const logContent = document.getElementById('clickLogContent');
            logContent.innerHTML = clicks.map((c, i) => `${i + 1}. ${c}`).join('<br>');
            
            // Add to test results
            const results = document.getElementById('testResults');
            results.innerHTML += `<div class="test-result test-success">✅ Click #${clickCount}: ${element}</div>`;
        }
        
        function checkZIndex() {
            const modal = document.querySelector('.modal');
            const backdrop = document.querySelector('.modal-backdrop');
            const dialog = document.querySelector('.modal-dialog');
            const content = document.querySelector('.modal-content');
            
            let info = '<strong>Z-Index Check:</strong><br>';
            
            if (backdrop) {
                const backdropZ = window.getComputedStyle(backdrop).zIndex;
                info += `Backdrop z-index: <strong>${backdropZ}</strong> (should be 1040)<br>`;
            } else {
                info += 'Backdrop: <span class="text-danger">NOT FOUND</span><br>';
            }
            
            if (modal) {
                const modalZ = window.getComputedStyle(modal).zIndex;
                info += `Modal z-index: <strong>${modalZ}</strong> (should be 1050)<br>`;
            } else {
                info += 'Modal: <span class="text-danger">NOT FOUND</span><br>';
            }
            
            if (dialog) {
                const dialogZ = window.getComputedStyle(dialog).zIndex;
                info += `Dialog z-index: <strong>${dialogZ}</strong> (should be 1051)<br>`;
            }
            
            if (content) {
                const contentZ = window.getComputedStyle(content).zIndex;
                const pointerEvents = window.getComputedStyle(content).pointerEvents;
                info += `Content z-index: <strong>${contentZ}</strong> (should be 1052)<br>`;
                info += `Content pointer-events: <strong>${pointerEvents}</strong> (should be auto)<br>`;
            }
            
            document.getElementById('zIndexInfo').innerHTML = info;
            
            // Test if modal is clickable
            if (content) {
                const rect = content.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const elementAtPoint = document.elementFromPoint(centerX, centerY);
                
                info += '<br><strong>Element at modal center:</strong> ' + elementAtPoint.tagName + '.' + elementAtPoint.className + '<br>';
                
                if (elementAtPoint.closest('.modal-content')) {
                    info += '<span class="text-success">✅ Modal content is on top!</span>';
                } else {
                    info += '<span class="text-danger">❌ Something else is covering the modal!</span>';
                }
                
                document.getElementById('zIndexInfo').innerHTML = info;
            }
        }
        
        // Monitor modal events
        document.getElementById('testModal').addEventListener('shown.bs.modal', function () {
            console.log('Modal shown event fired');
            document.getElementById('testResults').innerHTML += '<div class="test-result test-success">✅ Modal opened successfully</div>';
        });
        
        document.getElementById('testModal').addEventListener('hidden.bs.modal', function () {
            console.log('Modal hidden event fired');
            document.getElementById('testResults').innerHTML += '<div class="test-result test-success">✅ Modal closed successfully</div>';
        });
    </script>
</body>
</html>
